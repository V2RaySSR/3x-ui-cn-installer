name: 自动同步

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: 同步与生成
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 准备 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 安装依赖
        run: python -m pip install pyyaml

      - name: 拉取官方安装脚本
        run: |
          mkdir -p upstream generated
          curl -L https://raw.githubusercontent.com/MHSanaei/3x-ui/master/install.sh -o upstream/install.sh

      - name: 生成中文安装脚本
        run: python scripts/translate.py

      - name: 验证中文安装脚本
        run: |
          bash -n upstream/install.sh
          python scripts/validate.py --report /tmp/i18n-report.md

      - name: 确认生成过程可重复
        run: |
          cp generated/install-cn.sh /tmp/install-cn.sh
          python scripts/translate.py
          cmp /tmp/install-cn.sh generated/install-cn.sh

      - name: 创建同步 PR
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            upstream/install.sh
            generated/install-cn.sh
          commit-message: "同步官方安装脚本并生成中文版"
          branch: "auto/sync-upstream-install"
          delete-branch: true
          title: "同步官方安装脚本并生成中文版"
          body-path: /tmp/i18n-report.md
