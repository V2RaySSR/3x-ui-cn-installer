name: 同步官方安装脚本并生成中文版

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: 同步与生成
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 安装依赖
        run: python -m pip install pyyaml

      - name: 拉取官方安装脚本
        run: |
          mkdir -p upstream generated
          curl -L https://raw.githubusercontent.com/MHSanaei/3x-ui/master/install.sh -o upstream/install.sh

      - name: 生成中文安装脚本
        run: python scripts/translate.py

      - name: 创建同步 PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "同步官方安装脚本并生成中文版"
          branch: "auto/sync-upstream-install"
          delete-branch: true
          title: "同步官方安装脚本并生成中文版"
          body: |
            本 PR 由 GitHub Actions 自动创建。

            变更内容：
            - 同步官方 3x-ui 最新安装脚本
            - 根据 translations.yml 重新生成中文安装脚本

            请重点确认：
            - 官方脚本是否有新的交互文案需要补充翻译
            - generated/install-cn.sh 是否只包含预期的中文本地化变化
